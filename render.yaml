services:
  - type: web
    name: whitehouse-premiere
    runtime: php
    buildCommand: composer install --no-dev
    startCommand: php -S 0.0.0.0:${PORT:-8080} -t public
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: LOG_LEVEL
        value: warning
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: whitehouse-db
          property: connectionString

databases:
  - name: whitehouse-db
    databaseName: whitehouse
    plan: free
